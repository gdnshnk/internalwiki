<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternalWiki.com</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="main-header">
            <h1 class="main-title">InternalWiki.com</h1>
            <span class="version">v0.1</span>
        </header>

        <!-- Main Search Interface -->
        <div class="search-container">
            <div class="search-bar">
                <span class="search-icon"></span>
                <input type="text" id="queryInput" class="search-input" />
                <button id="querySubmit" class="search-submit">
                    <span class="submit-icon"></span>
                </button>
            </div>
        </div>

        <!-- Query History -->
        <div class="content-area">
            <div class="query-history" id="queryHistory">
                <div class="query-message bot">
                    <div class="message-content">
                        <p class="message-text">Welcome to InternalWiki.com. Ask me about policies, procedures, precedents, or institutional knowledge.</p>
                        <p class="message-meta">New system ready</p>
                    </div>
                    <div class="message-time">Just now</div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="main-footer">
            <div class="footer-stats">
                <span class="stats-label">Knowledge Nodes</span>
                <span class="stats-value">0</span>
            </div>
            <div class="footer-links">
                <a href="#">Terms of Service</a>
                <span> • </span>
                <a href="#">Privacy Policy</a>
                <span> • </span>
                <a href="#">AUP</a>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
